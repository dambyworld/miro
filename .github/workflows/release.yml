name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tar.gz
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="miro-${VERSION}-${TARGET}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${TARGET}/release" miro
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: miro-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: find artifacts/ -type f -name "*.tar.gz" -exec mv {} . \;

      - name: Generate checksums.txt
        run: shasum -a 256 miro-*.tar.gz > checksums.txt

      - name: Create GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "miro v${VERSION}" \
            --notes "miro v${VERSION} - brew install dambyworld/tap/miro" \
            miro-*.tar.gz checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.txt
          retention-days: 1

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: macos-latest
    steps:
      - name: Checkout miro (for scripts)
        uses: actions/checkout@v4
        with:
          path: miro-src

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: dambyworld/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums

      - name: Write updated formula
        run: |
          ARM_SHA=$(grep "aarch64-apple-darwin" checksums.txt | awk '{print $1}')
          X86_SHA=$(grep "x86_64-apple-darwin" checksums.txt | awk '{print $1}')
          MIRO_VERSION="${{ needs.release.outputs.version }}" \
          ARM_SHA256="${ARM_SHA}" \
          X86_SHA256="${X86_SHA}" \
          OUTPUT_FILE="homebrew-tap/Formula/miro.rb" \
          python3 miro-src/scripts/write-formula.py

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/miro.rb
          git commit -m "miro: update to v${{ needs.release.outputs.version }}"
          git push

  install-test:
    name: Install Test (Smoke)
    needs: [release, update-tap]
    runs-on: macos-latest
    steps:
      - name: Install via brew tap
        run: brew install dambyworld/tap/miro

      - name: Verify version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          INSTALLED=$(miro --version | awk '{print $2}')
          echo "Expected: ${VERSION}, Got: ${INSTALLED}"
          test "${INSTALLED}" = "${VERSION}"

      - name: Verify architecture
        run: file $(which miro)

      - name: Smoke test
        run: |
          miro --help
          miro list  || true
          miro themes

      - name: Upgrade test
        run: brew upgrade miro || true

      - name: Uninstall and reinstall
        run: |
          brew uninstall dambyworld/tap/miro
          brew install dambyworld/tap/miro
          miro --version
